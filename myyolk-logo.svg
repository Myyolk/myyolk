<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" width="200" height="80">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a4a"/>
      <stop offset="55%" stop-color="#8b3a2a"/>
      <stop offset="100%" stop-color="#f5a623"/>
    </linearGradient>
    <clipPath id="badge">
      <rect x="2" y="2" width="56" height="56" rx="28"/>
    </clipPath>
  </defs>

  <!-- Circle badge -->
  <rect x="2" y="2" width="56" height="56" rx="28" fill="url(#sky)"/>

  <!-- Rolling hills silhouette -->
  <path d="M2 42 Q12 30 22 34 Q30 37 38 28 Q46 20 58 36 L58 58 L2 58 Z" fill="#0a1628" opacity="0.75" clip-path="url(#badge)"/>

  <!-- Sun / yolk -->
  <circle cx="30" cy="30" r="16" fill="#F7C06B" clip-path="url(#badge)"/>
  <circle cx="30" cy="30" r="13" fill="#F5A623" clip-path="url(#badge)"/>
  <circle cx="24" cy="24" r="5" fill="#F8D070" opacity="0.4" clip-path="url(#badge)"/>

  <!-- Gold ring -->
  <rect x="2" y="2" width="56" height="56" rx="28" fill="none" stroke="#F5A623" stroke-width="2"/>

  <!-- MyYolk wordmark -->
  <text x="68" y="28" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#2D4A35">My<tspan fill="#F5A623">Yolk</tspan></text>
  <text x="68" y="44" font-family="Arial, sans-serif" font-size="8" fill="#888" letter-spacing="2">RETIREMENT PLANNING</text>
</svg>
